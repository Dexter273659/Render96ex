name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Setup MSYS2 & cache pacman packages
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          release: false      # reuse the runner’s MSYS2 install
          cache: true         # cache pacman packages between runs
          update: true
          install: |
            git
            curl
            tar
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Cache tpl2png build output
      - name: Cache tpl2png build
        uses: actions/cache@v3
        with:
          path: textures_repo/tpl-tools/tpl2png
          key: ${{ runner.os }}-tpl2png
          restore-keys: |
            ${{ runner.os }}-tpl2png

      # 4) Verify your legally-owned ROM is present
      - name: Check for baserom.us.z64
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add it to your repo root."
            exit 1
          fi

      # 5) Download & extract the HD texture pack (tarball, main branch)
      - name: Download and extract HD textures
        shell: msys2 {0}
        run: |
          curl -L --fail \
            https://codeload.github.com/pokeheadroom/RENDER96-HD-TEXTURE-PACK/tar.gz/main \
            -o textures.tar.gz
          tar -xzf textures.tar.gz
          mv RENDER96-HD-TEXTURE-PACK-main textures_repo

      # 6) Download & extract tpl-tools (tarball, main branch)
      - name: Download and extract tpl-tools
        shell: msys2 {0}
        run: |
          curl -L --fail \
            https://codeload.github.com/theofficialgman/tpl-tools/tar.gz/main \
            -o tpl-tools.tar.gz
          tar -xzf tpl-tools.tar.gz
          mv tpl-tools-main textures_repo/tpl-tools

      # 7) Build tpl2png (only on first run)
      - name: Build tpl2png
        shell: msys2 {0}
        run: |
          if [ ! -f textures_repo/tpl-tools/tpl2png ]; then
            pacman --noconfirm -S mingw-w64-ucrt-x86_64-gcc
            cd textures_repo/tpl-tools
            make
          fi
          cp textures_repo/tpl-tools/tpl2png /usr/bin/

      # 8) Convert all .tpl → .png
      - name: Convert TPL textures to PNG
        shell: msys2 {0}
        run: |
          mkdir -p textures
          for f in textures_repo/*.tpl; do
            [ -f "$f" ] && tpl2png "$f" "textures/$(basename "${f%.tpl}.png")"
          done

      # 9) Copy textures into your repo root
      - name: Copy Render96EX textures
        shell: msys2 {0}
        run: |
          cp -r textures .

      # 10) Build the UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: |
          make PLATFORM=uwp CONFIG=Release

      # 11) Collect build output
      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      # 12) Normalize the executable name
      - name: Normalize executable name
        shell: msys2 {0}
        run: |
          cd output
          exe=$(find . -type f -iname "*.exe" -print -quit)
          mv "$exe" Render96EX.exe

      # 13) Generate AppxManifest.xml
      - name: Generate AppxManifest.xml
        shell: pwsh
        run: |
          $lines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities" IgnorableNamespaces="uap rescap">',
            '  <Identity Name="com.KaydenBerry.Render96EX" Publisher="CN=841AFD4F-58DD-4BB8-A46A-FFE9B9E0B8E6" Version="1.0.0.0" />',
            '  <Properties>',
            '    <DisplayName>Render96EX</DisplayName>',
            '    <PublisherDisplayName>Kayden Berry</PublisherDisplayName>',
            '    <Description>Super Mario 64 UWP port</Description>',
            '    <Logo>Assets/StoreLogo.png</Logo>',
            '  </Properties>',
            '  <Dependencies>',
            '    <TargetDeviceFamily Name="Windows.Universal" MinVersion="10.0.0.0" MaxVersionTested="10.0.26100.0" />',
            '  </Dependencies>',
            '  <Resources>',
            '    <Resource Language="en-us" />',
            '  </Resources>',
            '  <Capabilities>',
            '    <rescap:Capability Name="runFullTrust" />',
            '  </Capabilities>',
            '  <Applications>',
            '    <Application Id="App" Executable="Render96EX.exe" EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements DisplayName="Render96EX" Square150x150Logo="Assets/Square150x150Logo.png" Square44x44Logo="Assets/Square44x44Logo.png" Description="Super Mario 64 UWP port" BackgroundColor="transparent" />',
            '    </Application>',
            '  </Applications>',
            '</Package>'
          )
          $lines | Out-File output\AppxManifest.xml -Encoding utf8

      # 14) Generate placeholder Assets
      - name: Generate placeholder Assets
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $out = "output\Assets"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $map = @{44='Square44x44Logo.png';150='Square150x150Logo.png';50='StoreLogo.png'}
          foreach ($s in $map.Keys) {
            $bmp = New-Object System.Drawing.Bitmap($s,$s)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::LightGray)
            $bmp.Save("$out\$($map[$s])",[System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose()
          }

      # 15) Package into a UWP .appx
      - name: Package UWP App
        shell: pwsh
        run: |
          $kits = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $makeappx = Get-ChildItem "$kits\*\x64\makeappx.exe" -Recurse | Sort-Object DirectoryName -Descending | Select-Object -First 1
          & $makeappx.FullName pack /d output /p Render96EX.appx

      # 16) Add SignTool to PATH
      - name: Add SignTool
        uses: KamaranL/add-signtool-action@v1

      # 17) Generate & export self-signed certificate
      - name: Generate Test Certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Render96EX Cert" -CertStoreLocation Cert:\CurrentUser\My -KeyExportPolicy Exportable -FriendlyName "Render96EXCert" -NotAfter (Get-Date).AddYears(5) -KeyAlgorithm RSA -HashAlgorithm SHA256
          $pwd = ConvertTo-SecureString 'ci-pass' -AsPlainText -Force
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath certificate.pfx -Password $pwd
          Export-Certificate   -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath certificate.cer

      # 18) Sign the .appx with timestamp
      - name: Sign the Appx
        shell: pwsh
        run: |
          signtool sign /fd SHA256 /f certificate.pfx /p ci-pass /tr http://timestamp.digicert.com /td SHA256 Render96EX.appx

      # 19) Upload signed .appx & certificate
      - name: Upload Signed Appx & Certificate
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            Render96EX.appx
            certificate.cer
