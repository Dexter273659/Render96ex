# .github/workflows/uwp-msys2.yml
name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code (with submodules, if any)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Set up MSYS2 and install make + the UCRT64 toolchain
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          # UCRT64 shell is recommended for UWP compatibility
          msystem: UCRT64
          update: true
          install: |
            make
            mingw-w64-ucrt-x86_64-toolchain

      # 3) Build using your Makefile in the repo root
      - name: Build with make
        shell: msys2 {0}
        run: |
          make PLATFORM=uwp CONFIG=Release

      # 4) Package into MSIX/AppX (assuming your Makefile’s package target)
      - name: Package into MSIX
        shell: msys2 {0}
        run: |
          make package

      # 5) Upload any generated UWP bundles for download
      - name: Upload UWP Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            **/*.msix
            **/*.msixbundle
            **/*.appxbundle
