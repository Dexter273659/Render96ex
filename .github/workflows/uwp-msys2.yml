# .github/workflows/uwp-msys2.yml
name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code (with any submodules)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Set up MSYS2 + install git, make, UCRT64 toolchain, SDL2, image/audio/font libs, etc.
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Verify you’ve added your base ROM as baserom.us.z64
      - name: Check for base ROM
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add your legally-owned ROM to the repo root with exactly this filename."
            exit 1
          fi

      # 4) Run your Makefile to build the UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: make PLATFORM=uwp CONFIG=Release

      # 5) Gather everything under build/ into a single output/ folder
      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      # 6) Package into an Appx using MakeAppx.exe from the Windows 10 SDK
      - name: Package UWP App
        shell: pwsh
        run: |
          $arch = 'x64'
          $kitsPath = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          # Pick the newest SDK folder that contains makeappx.exe
          $kitVersion = Get-ChildItem $kitsPath |
            Where-Object { Test-Path "$kitsPath\${($_.Name)}\$arch\makeappx.exe" } |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty Name
          $makeappx = Join-Path $kitsPath "$kitVersion\$arch\makeappx.exe"
          Write-Host "Packaging with: $makeappx"
          & $makeappx pack /d output /p Render96EX.appx  # :contentReference[oaicite:0]{index=0}

      # 7) Upload the resulting .appx so you can download & sideload it
      - name: Upload UWP Appx
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: Render96EX.appx
