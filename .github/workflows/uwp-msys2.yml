# .github/workflows/uwp-msys2.yml
name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code (include submodules if needed)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Install MSYS2 + toolchain & deps
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Verify baserom.us.z64 is present
      - name: Check for base ROM
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add your legally-owned ROM to the repo root with exactly this filename."
            exit 1
          fi

      # 4) Build UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: make PLATFORM=uwp CONFIG=Release

      # 5) Collect into output/
      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      # 6) Package with whatever makeappx.exe is on PATH
      - name: Package UWP App
        shell: pwsh
        run: |
          $makeappx = (where.exe makeappx.exe | Select-Object -First 1).Trim()
          if (-not (Test-Path $makeappx)) {
            Write-Error "makeappx.exe not found on PATH"
            exit 1
          }
          Write-Host "Using makeappx at: $makeappx"
          & $makeappx pack /d output /p Render96EX.appx

      # 7) Upload the .appx for sideloading
      - name: Upload UWP Appx
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: Render96EX.appx
