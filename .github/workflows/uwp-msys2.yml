# .github/workflows/uwp-msys2.yml
name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code repo (include submodules if you need them)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Spin up MSYS2, update, and install git, make, the UCRT64 toolchain, 
      #    plus all the libraries Render96EX needs
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_net
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-SDL2_ttf
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Ensure your base ROM is present
      - name: Check for base ROM
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – please add your legally-owned ROM to the repo root with this exact filename."
            exit 1
          fi

      # 4) Build your UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: make PLATFORM=uwp CONFIG=Release

      # 5) Package into MSIX/AppX
      - name: Package into MSIX
        shell: msys2 {0}
        run: make package

      # 6) Upload any generated UWP bundles for download
      - name: Upload UWP Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            **/*.msix
            **/*.msixbundle
            **/*.appxbundle
