name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Set up MSYS2 + dependencies
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Verify baserom.us.z64 is present
      - name: Check for base ROM
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add your legally-owned ROM as baserom.us.z64 in the repo root."
            exit 1
          fi

      # 4) Build the UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: make PLATFORM=uwp CONFIG=Release

      # 5) Collect into output/
      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      # 6) Copy the AppxManifest into output/
      - name: Copy AppxManifest
        run: |
          cp AppxManifest.xml output/

      # 7) Auto-generate placeholder PNG assets
      - name: Generate placeholder Assets
        shell: pwsh
        run: |
          $outAssets = "output\\Assets"
          if (!(Test-Path $outAssets)) { New-Item -ItemType Directory -Path $outAssets | Out-Null }
          Add-Type -AssemblyName System.Drawing
          $sizes = @{44='Square44x44Logo.png'; 150='Square150x150Logo.png'; 50='StoreLogo.png'}
          foreach ($size in $sizes.Keys) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::LightGray)
            $bmp.Save("$outAssets\\$($sizes[$size])",[System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose()
            $bmp.Dispose()
          }

      # 8) Package the Appx
      - name: Package UWP App
        shell: pwsh
        run: |
          $kits = "${env:ProgramFiles(x86)}\\Windows Kits\\10\\bin"
          $makeappx = Get-ChildItem -Path "$kits\\*\\x64\\makeappx.exe" -ErrorAction SilentlyContinue |
                       Sort-Object DirectoryName -Descending |
                       Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found." }
          & $makeappx.FullName pack /d output /p Render96EX.appx

      # 9) Upload the .appx for sideloading
      - name: Upload UWP Appx
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: Render96EX.appx
