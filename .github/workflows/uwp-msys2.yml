name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code repo (include submodules if you need them)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Spin up MSYS2, install git, make and the UCRT64 toolchain
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: |
            git
            make
            mingw-w64-ucrt-x86_64-toolchain

      # 3) Make sure the base ROM is present
      - name: Check for base ROM
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – please add your own N64 ROM to the repo root, named exactly baserom.us.z64"
            exit 1
          fi

      # 4) Build your UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: make PLATFORM=uwp CONFIG=Release

      # 5) Package into MSIX/AppX
      - name: Package into MSIX
        shell: msys2 {0}
        run: make package

      # 6) Upload any UWP bundles for download
      - name: Upload UWP Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            **/*.msix
            **/*.msixbundle
            **/*.appxbundle
