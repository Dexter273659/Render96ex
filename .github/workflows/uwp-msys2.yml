name: Build Render96EX UWP via MSYS2

on:
  workflow_dispatch:

jobs:
  uwp-msys2-build:
    runs-on: windows-latest

    steps:
      # 1) Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Setup MSYS2 & install build tools
      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          release: false
          cache: true
          update: true
          install: |
            git
            curl
            tar
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      # 3) Verify your legally-owned ROM is present
      - name: Check for baserom.us.z64
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add it to your repo root."
            exit 1
          fi

      # 4) Build the UWP binaries
      - name: Build with make
        shell: msys2 {0}
        run: |
          make PLATFORM=uwp CONFIG=Release

      # 5) Collect build output
      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      # 6) Normalize the executable name
      - name: Normalize executable name
        shell: msys2 {0}
        run: |
          cd output
          exe=$(find . -type f -iname "*.exe" -print -quit)
          mv "$exe" Render96EX.exe

      # 7) Generate AppxManifest.xml
      - name: Generate AppxManifest.xml
        shell: pwsh
        run: |
          $xml = @"
<?xml version="1.0" encoding="utf-8"?>
<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
         xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
         xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
         IgnorableNamespaces="uap rescap">
  <Identity Name="com.KaydenBerry.Render96EX"
            Publisher="CN=841AFD4F-58DD-4BB8-A46A-FFE9B9E0B8E6"
            Version="1.0.0.0" />
  <Properties>
    <DisplayName>Render96EX</DisplayName>
    <PublisherDisplayName>Kayden Berry</PublisherDisplayName>
    <Description>Super Mario 64 UWP port</Description>
    <Logo>Assets/StoreLogo.png</Logo>
  </Properties>
  <Dependencies>
    <TargetDeviceFamily Name="Windows.Universal"
                        MinVersion="10.0.0.0"
                        MaxVersionTested="10.0.26100.0" />
  </Dependencies>
  <Resources>
    <Resource Language="en-us" />
  </Resources>
  <Capabilities>
    <rescap:Capability Name="runFullTrust" />
  </Capabilities>
  <Applications>
    <Application Id="App"
                 Executable="Render96EX.exe"
                 EntryPoint="Windows.FullTrustApplication">
      <uap:VisualElements DisplayName="Render96EX"
                          Square150x150Logo="Assets/Square150x150Logo.png"
                          Square44x44Logo="Assets/Square44x44Logo.png"
                          Description="Super Mario 64 UWP port"
                          BackgroundColor="transparent" />
    </Application>
  </Applications>
</Package>
"@

          $xml | Out-File output\AppxManifest.xml -Encoding utf8

      # 8) Generate placeholder Assets (logos)
      - name: Generate placeholder Assets
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $out = "output\Assets"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $map = @{44='Square44x44Logo.png';150='Square150x150Logo.png';50='StoreLogo.png'}
          foreach ($size in $map.Keys) {
            $bmp = New-Object System.Drawing.Bitmap($size,$size)
            $gfx = [System.Drawing.Graphics]::FromImage($bmp)
            $gfx.Clear([System.Drawing.Color]::LightGray)
            $bmp.Save("$out\$($map[$size])",[System.Drawing.Imaging.ImageFormat]::Png)
            $gfx.Dispose(); $bmp.Dispose()
          }

      # 9) Package into a UWP .appx
      - name: Package UWP App
        shell: pwsh
        run: |
          $kits = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $makeappx = Get-ChildItem "$kits\*\x64\makeappx.exe" -Recurse |
                      Sort-Object DirectoryName -Descending |
                      Select-Object -First 1
          & $makeappx.FullName pack /d output /p Render96EX.appx

      # ─── Signing steps ─────────────────────────────────────────────────────────

      # 10) Add SignTool to PATH
      - name: Add SignTool
        uses: KamaranL/add-signtool-action@v1

      # 11) Generate a self-signed certificate matching your Publisher ID
      - name: Generate Test Certificate
        shell: pwsh
        run: |
          $publisher = 'CN=841AFD4F-58DD-4BB8-A46A-FFE9B9E0B8E6'
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject $publisher `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyExportPolicy Exportable `
            -FriendlyName 'Render96EXCert' `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(5)
          $pwd = ConvertTo-SecureString 'ci-pass' -AsPlainText -Force
          Export-PfxCertificate `
            -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath certificate.pfx `
            -Password $pwd
          Export-Certificate `
            -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath certificate.cer

      # 12) Sign the Appx with SHA-256 & DigiCert timestamp
      - name: Sign the Appx
        shell: pwsh
        run: |
          signtool sign `
            /fd SHA256 `
            /f certificate.pfx `
            /p ci-pass `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            Render96EX.appx

      # 13) Upload signed .appx & public cert
      - name: Upload Signed Appx & Certificate
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            Render96EX.appx
            certificate.cer
