name: Build Render96ex for Switch

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    # use a libnx-ready container so we don't need to install anything ourselves :contentReference[oaicite:0]{index=0}
    container:
      image: ghcr.io/d3fau4/nx-dev:main

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build with make
        run: make -j$(nproc)

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: render96ex.nro
