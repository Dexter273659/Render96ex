name: Build Render96ex for Switch

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: yesimnathan/switchdev:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Mark workspace as safe for Git
        run: |
          git config --global --add safe.directory "${{ github.workspace }}"

      - name: Install SDL2
        run: |
          apt-get update --allow-releaseinfo-change
          apt-get install -y libsdl2-dev

      - name: Build for PC & Switch (ignore errors)
        run: |
          make -i -j$(nproc)
          make -i TARGET_SWITCH=1 -j$(nproc)

      - name: Locate any build artifacts
        run: |
          echo "=== Listing all .nro files ==="
          find . -type f -name '*.nro'

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: build/*_nx/*.nro
          if-no-files-found: ignore
