name: Build Render96ex for Switch

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install devkitPro pacman & Switch SDK
        run: |
          sudo apt update
          sudo apt install -y cmake git wget tar python3 dpkg

          # Install the devkitPro pacman helper
          wget https://apt.devkitpro.org/install-devkitpro-pacman -O install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman

          # Overwrite pacman config to use the correct servers (fixes 403 errors)
          sudo tee /etc/pacman.d/devkitpro.conf > /dev/null << 'EOF'
[dkp-libs]
Server = https://pkg.devkitpro.org/packages/

[dkp-linux]
Server = https://pkg.devkitpro.org/packages/linux/\$arch/
EOF :contentReference[oaicite:2]{index=2}

          # Import the devkitPro keyring so pacman can verify packages
          wget https://pkg.devkitpro.org/devkitpro-keyring.pkg.tar.xz
          sudo pacman -U devkitpro-keyring.pkg.tar.xz --noconfirm :contentReference[oaicite:3]{index=3}

          # Update and install the Switch toolchain
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev switch-tools

      - name: Build with make
        run: |
          # Repo root should contain your Makefile
          make -j$(nproc)

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: render96ex.nro
