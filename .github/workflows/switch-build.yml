name: Build Render96ex for Switch

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/d3fau4/nx-dev:main

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install host SDL2 dev package
        run: |
          apt-get update --allow-releaseinfo-change
          apt-get install -y libsdl2-dev

      - name: Ensure ROM is present
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "Error: You must add baserom.us.z64 to the repo root!"
            exit 1
          fi

      - name: Build for PC (native)  
        run: |
          # Extracts all assets into build/us_pc; required before Switch build
          make -i -j$(nproc)                        # :contentReference[oaicite:1]{index=1}

      - name: Build for Switch  
        run: |
          # Cross-compile into an .nro using libnx
          make -i TARGET_SWITCH=1 -j$(nproc)        # :contentReference[oaicite:2]{index=2}

      - name: List built files  
        run: find .

      - name: Upload NRO artifact  
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: build/*_nx/*.nro                  # matches build/{lang}_nx/*.nro :contentReference[oaicite:3]{index=3}
