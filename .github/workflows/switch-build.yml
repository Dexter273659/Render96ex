name: Build Render96EX (UWP & Switch)

on:
  workflow_dispatch:

jobs:
  ###########################################################################
  # 1) UWP build (MSYS2 on Windows) – your original pipeline, verbatim.
  ###########################################################################
  uwp-msys2-build:
    name: Build Render96EX UWP (MSYS2)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 & install build tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          release: false
          cache: true
          update: true
          install: |
            git
            curl
            tar
            make
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Check for baserom.us.z64
        shell: msys2 {0}
        run: |
          if [ ! -f baserom.us.z64 ]; then
            echo "::error::Missing baserom.us.z64 – add it to your repo root."
            exit 1
          fi

      - name: Build with make
        shell: msys2 {0}
        run: |
          make PLATFORM=uwp CONFIG=Release

      - name: Collect build output
        shell: msys2 {0}
        run: |
          mkdir -p output
          cp -r build/* output/

      - name: Normalize executable name
        shell: msys2 {0}
        run: |
          cd output
          exe=$(find . -type f -iname "*.exe" -print -quit)
          mv "$exe" Render96EX.exe

      - name: Generate AppxManifest.xml
        shell: pwsh
        run: |
          $lines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities" IgnorableNamespaces="uap rescap">',
            '  <Identity Name="com.KaydenBerry.Render96EX" Publisher="CN=841AFD4F-58DD-4BB8-A46A-FFE9B9E0B8E6" Version="1.0.0.0" />',
            '  <Properties>',
            '    <DisplayName>Render96EX</DisplayName>',
            '    <PublisherDisplayName>Kayden Berry</PublisherDisplayName>',
            '    <Description>Super Mario 64 UWP port</Description>',
            '    <Logo>Assets/StoreLogo.png</Logo>',
            '  </Properties>',
            '  <Dependencies>',
            '    <TargetDeviceFamily Name="Windows.Universal" MinVersion="10.0.0.0" MaxVersionTested="10.0.26100.0" />',
            '  </Dependencies>',
            '  <Resources>',
            '    <Resource Language="en-us" />',
            '  </Resources>',
            '  <Capabilities>',
            '    <rescap:Capability Name="runFullTrust" />',
            '  </Capabilities>',
            '  <Applications>',
            '    <Application Id="App" Executable="Render96EX.exe" EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements DisplayName="Render96EX" Square150x150Logo="Assets/Square150x150Logo.png" Square44x44Logo="Assets/Square44x44Logo.png" Description="Super Mario 64 UWP port" BackgroundColor="transparent" />',
            '    </Application>',
            '  </Applications>',
            '</Package>'
          )
          $lines | Out-File output\AppxManifest.xml -Encoding utf8

      - name: Generate placeholder Assets
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          New-Item -ItemType Directory -Force -Path output\Assets | Out-Null
          $map = @{44='Square44x44Logo.png';150='Square150x150Logo.png';50='StoreLogo.png'}
          foreach ($size in $map.Keys) {
            $bmp = New-Object System.Drawing.Bitmap($size,$size)
            $gfx = [System.Drawing.Graphics]::FromImage($bmp)
            $gfx.Clear([System.Drawing.Color]::LightGray)
            $bmp.Save("output\Assets\$($map[$size])",[System.Drawing.Imaging.ImageFormat]::Png)
            $gfx.Dispose(); $bmp.Dispose()
          }

      - name: Package UWP App
        shell: pwsh
        run: |
          $kits = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $makeappx = Get-ChildItem "$kits\*\x64\makeappx.exe" -Recurse | Sort-Object DirectoryName -Descending | Select-Object -First 1
          & $makeappx.FullName pack /d output /p Render96EX.appx

      - name: Add SignTool
        uses: KamaranL/add-signtool-action@v1

      - name: Generate Test Certificate
        shell: pwsh
        run: |
          $publisher = 'CN=841AFD4F-58DD-4BB8-A46A-FFE9B9E0B8E6'
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject $publisher -CertStoreLocation Cert:\CurrentUser\My -KeyExportPolicy Exportable -FriendlyName 'Render96EXCert' -HashAlgorithm SHA256 -NotAfter (Get-Date).AddYears(5)
          $pwd  = ConvertTo-SecureString 'ci-pass' -AsPlainText -Force
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath certificate.pfx -Password $pwd
          Export-Certificate   -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath certificate.cer

      - name: Sign the Appx
        shell: pwsh
        run: |
          signtool sign /fd SHA256 /f certificate.pfx /p ci-pass /tr http://timestamp.digicert.com /td SHA256 Render96EX.appx

      - name: Upload Signed Appx & Certificate
        uses: actions/upload-artifact@v4
        with:
          name: Render96EX-UWP
          path: |
            Render96EX.appx
            certificate.cer

  ###########################################################################
  # 2) Switch build (Ubuntu) – two‐phase make with devkitPro + SDL2 + explicit debug.
  ###########################################################################
  switch-build:
    name: Build Render96EX for Nintendo Switch
    runs-on: ubuntu-latest
    needs: uwp-msys2-build      # remove this line if you want to run Switch in parallel

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify baserom presence
        run: |
          if [ ! -f baserom.us.z64 ] && [ ! -f baserom.eu.z64 ] && [ ! -f baserom.jp.z64 ]; then
            echo "Error: Add a baserom.<region>.z64 (us, eu, or jp) to the repo root."
            exit 1
          fi

      - name: Install devkitPro & Switch SDK
        run: |
          sudo apt update
          sudo apt install -y cmake git wget tar python3 dpkg

          # Install the official devkitPro pacman helper
          wget https://apt.devkitpro.org/install-devkitpro-pacman -O install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman

          # Sync & install exactly what the wiki recommends
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitA64 libnx switch-tools switch-sdl2

      - name: Install host SDL2 for native build
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y libsdl2-dev

      - name: Build for PC (extract assets)
        run: |
          echo "=== Native build (extracting assets) ==="
          make -j$(nproc)
          # If this step fails, inspect the error logs. Once it succeeds, you should see
          # folders like build/us_pc/... with all the extracted files.

      - name: Check PC build output
        run: |
          echo "=== Files under build after native build ==="
          find build -maxdepth 3 -type f | sed 's|^|  » |' || echo "No PC build files found"
          echo ""

      - name: Build for Switch (produce .nro)
        run: |
          echo "=== Switch build (TARGET_SWITCH=1) ==="
          # Typically switchvars.sh is already sourced by devkitPro installer,
          # but to be safe we source it if it exists:
          if [ -f "$DEVKITPRO/switchvars.sh" ]; then
            . "$DEVKITPRO/switchvars.sh"
          fi
          make TARGET_SWITCH=1 -j$(nproc)
          # This should produce an .nro under build/{lang}_nx/ (e.g. build/us_nx/Render96ex.nro).

      - name: Check Switch build output
        run: |
          echo "=== Files under build after switch build ==="
          find build -maxdepth 4 -type f | sed 's|^|  » |' || echo "No files found in build/"
          echo ""

      - name: Upload EXACT .nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          # ▶ CHANGE THIS TO THE EXACT PATH YOU SAW IN THE PREVIOUS STEP logs.
          #   For example, if “find” printed “build/us_nx/Render96ex.nro” use that:
          path: build/us_nx/Render96ex.nro
