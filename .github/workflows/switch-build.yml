name: Build Render96ex for Switch

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify baserom presence
        run: |
          if [ ! -f baserom.us.z64 ] && [ ! -f baserom.eu.z64 ] && [ ! -f baserom.jp.z64 ]; then
            echo "Error: Add a baserom.<region>.z64 to the repo root."
            exit 1
          fi

      - name: Install devkitPro & Switch SDK
        run: |
          sudo apt update
          sudo apt install -y cmake git wget tar python3 dpkg
          wget https://apt.devkitpro.org/install-devkitpro-pacman -O install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm switch-dev switch-tools

      - name: Install host SDL2 dev package
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y libsdl2-dev

      - name: Build for PC (extract assets)
        run: make -i -j$(nproc)

      - name: Build for Switch
        run: make -i TARGET_SWITCH=1 -j$(nproc)

      - name: "Debug: locate .nro files"
        run: |
          echo "Looking for .nro outputs..."
          find . -type f -name '*.nro' || echo "No .nro files found"

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-NRO
          path: '**/*.nro'
