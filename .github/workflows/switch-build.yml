name: Build Render96ex for Switch

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/d3fau4/nx-dev:main

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install host SDL2 dev package
        run: |
          apt-get update --allow-releaseinfo-change
          apt-get install -y libsdl2-dev

      - name: Prepare Switch SDK
        run: |
          # POSIX-compatible “source” for /bin/sh
          . "$DEVKITPRO/switchvars.sh"

      - name: Build for Switch (ignore clean-up errors)
        run: make -i TARGET_SWITCH=1 -j$(nproc)

      - name: List built files
        run: find .

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: 'build/*_nx/*.nro'
