name: Build Render96ex for Switch

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: yesimnathan/switchdev:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install host SDL2 dev package
        run: |
          apt-get update --allow-releaseinfo-change
          apt-get install -y libsdl2-dev

      - name: Build for PC & Switch (ignore clean-up errs)
        run: |
          make -i -j$(nproc)                    # native build to extract assets
          make -i TARGET_SWITCH=1 -j$(nproc)    # cross-compile to .nro

      - name: Debug: Locate any .nro files
        run: |
          echo "=== Locating .nro artifacts ==="
          find . -type f -name '*.nro' || echo "No .nro found"

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: Render96ex-Switch
          path: '**/*.nro'                    # adjust to the path shown by the debug step
