name: Build sm64ex-UWP with Render96EX HD
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      # 1) Checkout this Render96EX fork into ./render96ex
      - name: Checkout Render96EX
        uses: actions/checkout@v4
        with:
          path: render96ex

      # 2) Clone the upstream sm64ex beside it
      - name: Clone sm64ex
        run: git clone --depth=1 https://github.com/sm64pc/sm64ex.git sm64ex

      # 3A) Install MSYS2 & MinGW
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc make

      # 3B) Build the host-side N64 asset tools under MSYS2
      - name: Build host tools
        shell: msys2 {0}
        run: |
          cd sm64ex/tools
          make n64graphics skyconv mio0 aifc_decode

      # 4) Add those tools to the PATH for later steps
      - name: Expose host tools
        run: echo "${{ github.workspace }}/sm64ex/tools" >> $GITHUB_PATH

      # 5) Activate MSVC + Windows SDK for UWP build
      - name: Activate MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # 6) Build SDL2-UWP (x64 Release) into sm64ex/extern/SDL2_UWP
      - name: Build SDL2-UWP
        shell: pwsh
        run: |
          git clone --depth=1 --branch release-2.32.4 https://github.com/libsdl-org/SDL.git SDL-src
          msbuild SDL-src\VisualC-WinRT\SDL-UWP.sln /p:Configuration=Release /p:Platform=x64
          Remove-Item -Recurse -Force sm64ex\extern\SDL2_UWP
          New-Item -ItemType Directory sm64ex\extern\SDL2_UWP\include
          New-Item -ItemType Directory sm64ex\extern\SDL2_UWP\lib\x64
          Copy-Item SDL-src\include\* sm64ex\extern\SDL2_UWP\include\ -Recurse
          Copy-Item SDL-src\VisualC-WinRT\UWP\x64\Release\SDL2-UWP.lib,SDL-src\VisualC-WinRT\UWP\x64\Release\SDL2main.lib sm64ex\extern\SDL2_UWP\lib\x64\

      # 7) Build & package via our wrapper Makefile.uwp
      - name: Build & Package UWP
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          make -f render96ex/Makefile.uwp clean
          make -f render96ex/Makefile.uwp all
          make -f render96ex/Makefile.uwp package

      # 8) Upload the .appx artifact
      - uses: actions/upload-artifact@v4
        with:
          name: sm64ex-uwp
          path: sm64ex\build\sm64exUWP.appx
